 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <button class="back">←</button>
  <button class="home">🏠</button>
  <select>
    <option>English</option>
  </select>
  <button class="user">👤</button>
</div>

<!-- Balance Card -->
<div class="card">
  <h2>Account Balance</h2>

  <div class="wallet">
    <p>Main Wallet</p>
    <span id="mainBalance">$0</span>
  </div>

  <div class="wallet">
    <p>Profit Wallet</p>
    <span id="profitBalance">$0</span>
  </div>
</div>

<!-- Buttons -->
<div class="actions">
  <button class="trade">Trade with Binance</button>

  <div class="row">
    <button onclick="deposit()">Deposit</button>
    <button onclick="invest()">Invest Now</button>
  </div>

  <button class="buy">Buy Crypto</button>
</div>

<!-- Menu -->
<div class="menu">
  <p class="active">Dashboard</p>
  <p>All Plans</p>
  <p>Plan Logs</p>
  <p>All Transactions</p>
  <p>Add Money</p>
</div>

<script src="dashboard.js"></script>

</body>
</html>
